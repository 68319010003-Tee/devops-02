<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกมยิงจุดโทษ</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin-top: 50px;
    }
    button {
        padding: 15px;
        margin: 10px;
        font-size: 18px;
    }
    #result {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
    }
    #score {
        font-size: 20px;
        margin-bottom: 20px;
    }
</style>
</head>
<body>

<h1>⚽ เกมยิงจุดโทษ</h1>

<div id="score">
    คะแนน: <span id="player">0</span>
</div>

<p>เลือกทิศทางยิง</p>

<button onclick="shoot('ซ้าย')">⬅️ ซ้าย</button>
<button onclick="shoot('กลาง')">⬆️ กลาง</button>
<button onclick="shoot('ขวา')">➡️ ขวา</button>

<div id="result"></div>

<script>
let score = 0;

function shoot(direction) {
    const choices = ['ซ้าย', 'กลาง', 'ขวา'];
    const goalkeeper = choices[Math.floor(Math.random() * 3)];

    if (direction === goalkeeper) {
        document.getElementById("result").innerHTML =
            `🧤 ผู้รักษาประตูพุ่ง ${goalkeeper}<br>❌ เซฟได้!`;
    } else {
        score++;
        document.getElementById("result").innerHTML =
            `🧤 ผู้รักษาประตูพุ่ง ${goalkeeper}<br>⚽ GOAL!!!`;
        document.getElementById("player").innerText = score;
    }
}
</script>

</body>
</html>

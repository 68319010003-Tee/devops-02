<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เป่ายิ้งฉุบ</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }
    button {
        padding: 15px;
        margin: 10px;
        font-size: 18px;
        cursor: pointer;
    }
    #result {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>✊✋✌ เกมเป่ายิ้งฉุบ</h1>

<button onclick="play('ค้อน')">✊ ค้อน</button>
<button onclick="play('กระดาษ')">✋ กระดาษ</button>
<button onclick="play('กรรไกร')">✌ กรรไกร</button>

<div id="result"></div>

<script>
function play(player) {
    const choices = ['ค้อน', 'กระดาษ', 'กรรไกร'];
    const computer = choices[Math.floor(Math.random() * 3)];

    let result = "";

    if (player === computer) {
        result = "🤝 เสมอ!";
    } else if (
        (player === 'ค้อน' && computer === 'กรรไกร') ||
        (player === 'กระดาษ' && computer === 'ค้อน') ||
        (player === 'กรรไกร' && computer === 'กระดาษ')
    ) {
        result = "🎉 คุณชนะ!";
    } else {
        result = "😢 คอมชนะ!";
    }

    document.getElementById("result").innerHTML =
        `คุณ: ${player}<br>คอม: ${computer}<br><br>${result}`;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมทายคำ</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }
    input, button {
        padding: 10px;
        font-size: 18px;
        margin: 5px;
    }
    #hint, #result {
        margin-top: 20px;
        font-size: 20px;
    }
</style>
</head>
<body>

<h1>🎮 เกมทายคำ</h1>

<p id="hint"></p>

<input type="text" id="guess" placeholder="พิมพ์คำตอบ">
<button onclick="checkAnswer()">ตอบ</button>

<p id="result"></p>

<script>
const words = [
    { word: "คอมพิวเตอร์", hint: "อุปกรณ์สำหรับประมวลผลข้อมูล" },
    { word: "โรงเรียน", hint: "สถานที่สำหรับศึกษา" },
    { word: "ฟุตบอล", hint: "กีฬาที่ใช้เท้าเตะลูกบอล" },
    { word: "ประเทศไทย", hint: "ประเทศที่มีกรุงเทพมหานครเป็นเมืองหลวง" },
    { word: "GitHub", hint: "เว็บไซต์สำหรับเก็บโค้ด" }
];

let current = words[Math.floor(Math.random() * words.length)];

document.getElementById("hint").innerHTML =
    "💡 คำใบ้: " + current.hint;

function checkAnswer() {
    const guess = document.getElementById("guess").value.trim();

    if (guess.toLowerCase() === current.word.toLowerCase()) {
        document.getElementById("result").innerHTML =
            "🎉 ตอบถูก!";
    } else {
        document.getElementById("result").innerHTML =
            "❌ ตอบผิด ลองใหม่";
    }
}
</script>

</body>
</html>
